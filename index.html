<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TapSakay – Smart Signage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="location">
      <img src="assets/pin.png" alt="Location Pin">
      <h1>JY SQUARE</h1>
    </div>
    <div class="time-block">
      <div class="time" id="timeDisplay">--:-- --</div>
      <div class="label">Smart Signage</div>
    </div>
  </header>

  <!-- Main Container -->
  <main class="main-container">
    <h2 class="title">TAPSAKAY</h2>

    <!-- White box with jeep info -->
    <div class="white-container">
      <div class="route-row">
        <div class="route-number" style="background-color:#F97316;">09C</div>
        <div class="mins">3 MINS</div>
        <div class="seats">SEATS AVAILABLE: 02</div>
      </div>
      <div class="route-row">
        <div class="route-number" style="background-color:#2D62FF;">10F</div>
        <div class="mins">5 MINS</div>
        <div class="seats">SEATS AVAILABLE: 10</div>
      </div>
    </div>

    <!-- Scan QR Container -->
    <div class="scan-qr-container">
      <img src="assets/qr.png" alt="QR Code">
      SCAN QR
    </div>
    <div class="tap-sticker-container">
      TAP STICKER HERE
    </div>

  </main>

  <footer class="footer">
    1 COMMUTER WAITING AT JY SQUARE FOR 09C
  </footer>

  <script src="script.js"></script>
</body>
</html>
